<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DIAVRO | Official Store</title>
    <style>
        /* This is the "Rulebook" for how the site looks */
        body { 
            background-color: black; 
            color: white; 
            text-align: center; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* The Top Menu */
        .navbar {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            background: #111;
            border-bottom: 1px solid #222;
        }
        .navbar a {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .navbar a:hover { color: white; }

        /* The Logo and Title */
        .hero { padding: 60px 20px; }
        .logo-img { margin-bottom: 10px; }
        .brand-name { 
            letter-spacing: 12px; 
            font-size: 50px; 
            margin: 10px 0;
            text-transform: uppercase;
        }
        .subtitle { color: #666; letter-spacing: 3px; font-size: 14px; margin-bottom: 30px; }

        /* The "Shop Now" Button */
        .main-btn {
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 2px;
            transition: 0.3s;
        }
        .main-btn:hover { background: #ccc; }

        /* The Clothing Grid */
        .collection-title { margin-top: 80px; letter-spacing: 5px; color: white; font-size: 20px; }
        .grid {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 40px auto;
            flex-wrap: wrap;
            max-width: 1000px;
        }
        .product { width: 250px; text-align: left; }
        .product img { 
            width: 100%; 
            height: 320px; 
            background: #1a1a1a; /* Placeholder color if image is missing */
            object-fit: cover;
            border: 1px solid #222;
        }
        .product p { margin: 10px 0 5px 0; letter-spacing: 1px; }
        .price { color: #888; font-size: 14px; }

        /* Footer */
        footer { margin-top: 100px; padding: 40px; background: #050505; color: #444; font-size: 11px; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#">SHOP</a>
        <a href="#">COLLECTIONS</a>
        <a href="#">ABOUT</a>
        <a href="#">CONTACT</a>
    </div>

    <div class="hero">
        <img src="logo.png" width="160" class="logo-img" alt="DIAVRO Logo">
        <h1 class="brand-name">DIAVRO</h1>
        <p class="subtitle">BY EYAD RAMY</p>
        <button class="main-btn">COMING SUMMER 2026</button>
    </div>

    <h2 class="collection-title">NEW ARRIVALS</h2>
    <div class="grid">
        <div class="product">
            <img src="shirt1.jpg" alt="Item 1">
            <p>ESSENTIAL OVERSIZED TEE</p>
            <div class="price">550 EGP</div>
        </div>
        <div class="product">
            <img src="hoodie1.jpg" alt="Item 2">
            <p>EVOLVED HOODIE - BLACK</p>
            <div class="price">950 EGP</div>
        </div>
        <div class="product">
            <img src="pants1.jpg" alt="Item 3">
            <p>DIAVRO SIGNATURE JOGGERS</p>
            <div class="price">700 EGP</div>
        </div>
    </div>

    <footer>
        <p>© 2026 DIAVRO CLOTHING CO.</p>
        <p>6TH OF OCTOBER CITY, EGYPT</p>
    </footer>

</body>
</html>
